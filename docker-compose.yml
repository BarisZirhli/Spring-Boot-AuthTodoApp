services:
  auth-db:
    image: postgres:16
    container_name: authcrud-auth-db
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${AUTH_DB_USERNAME}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - "${AUTH_DB_PORT}:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USERNAME} -d ${AUTH_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  todo-db:
    image: postgres:16
    container_name: authcrud-todo-db
    environment:
      POSTGRES_DB: ${TODO_DB_NAME}
      POSTGRES_USER: ${TODO_DB_USERNAME}
      POSTGRES_PASSWORD: ${TODO_DB_PASSWORD}
    ports:
      - "${TODO_DB_PORT}:5432"
    volumes:
      - todo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TODO_DB_USERNAME} -d ${TODO_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: authcrud-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
      redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
      redis-server --appendonly yes;
      fi'
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.9.0
    container_name: authcrud-kafka
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:19092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://:19093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:19093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:19092 --list || exit 1"]
      interval: 10s
      timeout: 20s
      retries: 12
  auth-service:
    build: ./auth-service
    container_name: authcrud-auth-service
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: ${AUTH_DB_NAME}
      DB_USERNAME: ${AUTH_DB_USERNAME}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET}
      SECURITY_JWT_EXPIRATION_MS: ${SECURITY_JWT_EXPIRATION_MS}
      SECURITY_JWT_REFRESH_EXPIRATION_MS: ${SECURITY_JWT_REFRESH_EXPIRATION_MS}
      SECURITY_RATE_LIMIT_LOGIN_MAX_ATTEMPTS: ${SECURITY_RATE_LIMIT_LOGIN_MAX_ATTEMPTS}
      SECURITY_RATE_LIMIT_LOGIN_WINDOW_SECONDS: ${SECURITY_RATE_LIMIT_LOGIN_WINDOW_SECONDS}
      SECURITY_BRUTEFORCE_MAX_FAILURES: ${SECURITY_BRUTEFORCE_MAX_FAILURES}
      SECURITY_BRUTEFORCE_WINDOW_SECONDS: ${SECURITY_BRUTEFORCE_WINDOW_SECONDS}
      SECURITY_BRUTEFORCE_LOCK_SECONDS: ${SECURITY_BRUTEFORCE_LOCK_SECONDS}
    ports:
      - "8081:8081"

  todo-service:
    build: ./todo-service
    container_name: authcrud-todo-service
    depends_on:
      todo-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      DB_HOST: todo-db
      DB_PORT: 5432
      DB_NAME: ${TODO_DB_NAME}
      DB_USERNAME: ${TODO_DB_USERNAME}
      DB_PASSWORD: ${TODO_DB_PASSWORD}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET}
      SECURITY_JWT_EXPIRATION_MS: ${SECURITY_JWT_EXPIRATION_MS}
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      TODO_EVENTS_TOPIC: ${TODO_EVENTS_TOPIC:-todo.events}
    ports:
      - "8082:8082"

  notification-service:
    build: ./notification-service
    container_name: authcrud-notification-service
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SERVER_PORT: 8083
      KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      TODO_EVENTS_TOPIC: ${TODO_EVENTS_TOPIC:-todo.events}
    ports:
      - "8083:8083"

  gateway:
    build: ./gateway
    container_name: authcrud-gateway
    depends_on:
      - auth-service
      - todo-service
    environment:
      GATEWAY_PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:8081
      TODO_SERVICE_URL: http://todo-service:8082
    ports:
      - "8080:8080"

volumes:
  auth_postgres_data:
  todo_postgres_data:
