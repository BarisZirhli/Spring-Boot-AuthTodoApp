server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      x-forwarded:
        enabled: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: todo-service
          uri: ${TODO_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/todos/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/notifications/**
        - id: search-service  
          uri: ${SEARCH_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/search/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

