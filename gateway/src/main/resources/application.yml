server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      x-forwarded:
        enabled: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: todo-service
          uri: ${TODO_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/todos/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

