spring.application.name=auth-crud

server.port=${SERVER_PORT}


spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false

security.jwt.secret=${SECURITY_JWT_SECRET}
security.jwt.expiration-ms=${SECURITY_JWT_EXPIRATION_MS}
security.jwt.refresh-expiration-ms=${SECURITY_JWT_REFRESH_EXPIRATION_MS}
security.rate-limit.login.max-attempts=${SECURITY_RATE_LIMIT_LOGIN_MAX_ATTEMPTS}
security.rate-limit.login.window-seconds=${SECURITY_RATE_LIMIT_LOGIN_WINDOW_SECONDS}
security.bruteforce.max-failures=${SECURITY_BRUTEFORCE_MAX_FAILURES}
security.bruteforce.window-seconds=${SECURITY_BRUTEFORCE_WINDOW_SECONDS}
security.bruteforce.lock-seconds=${SECURITY_BRUTEFORCE_LOCK_SECONDS}
